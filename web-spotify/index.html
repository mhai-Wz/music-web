<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- Viewport tối ưu cho mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="description" content="Web nghe nhạc Trung chữa lành - Glassmorphism" />

    <title>Nhạc Chữa Lành | Music Therapy</title>

    <!-- Preload font và resources quan trọng (nếu có) -->
    <!-- <link rel="preload" href="/fonts/your-font.woff2" as="font" type="font/woff2" crossorigin /> -->

    <style>
      /* Reset & Smooth Scroll cho mobile */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
        -webkit-tap-highlight-color: transparent; /* Xóa highlight khi click trên mobile */
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        background: #0f0f1a;
        color: white;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch; /* Scroll mượt trên iOS */
      }

      /* Ẩn thanh cuộn mặc định nhưng vẫn cho scroll */
      ::-webkit-scrollbar {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
